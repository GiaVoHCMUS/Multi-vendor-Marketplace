name: Backend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Thiết lập thư mục làm việc mặc định cho tất cả các lệnh run ở dưới
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"
          cache: "npm"
          cache-dependency-path: "./backend/package-lock.json" # Trỏ cụ thể file lock để cache

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test

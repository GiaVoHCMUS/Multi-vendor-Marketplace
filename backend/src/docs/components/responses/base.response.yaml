Success:
  description: Success response
  content:
    application/json:
      schema:
        type: object
        properties:
          success:
            type: boolean
            example: true
          message:
            type: string
            example: 'Operation successful'
          data:
            oneOf:
              - type: object
              - type: array
                items:
                  type: object
            nullable: true
          meta:
            type: object
            nullable: true
            example:
              page: 1
              limie: 10

LoginSuccess:
  description: Login success
  content:
    application/json:
      schema:
        type: object
        properties:
          success:
            type: boolean
          message:
            type: string
          data:
            type: object
            properties:
              accessToken:
                type: string

TokenRefresh:
  description: Refresh token success
  content:
    application/json:
      schema:
        type: object
        properties:
          success:
            type: boolean
          data:
            type: object
            properties:
              accessToken:
                type: string

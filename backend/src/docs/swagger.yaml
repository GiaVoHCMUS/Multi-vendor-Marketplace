openapi: 3.0.0

info:
  title: Multi-vendor Marketplace API
  version: 1.0.0
  description: Multi-vendor marketplace backend

servers:
  - url: http://localhost:3000/api

tags:
  - name: Auth
    description: Authentication APIs

paths:
  /auth/register:
    $ref: './paths/auth.yaml#/register'
  /auth/login:
    $ref: './paths/auth.yaml#/login'
  /auth/refresh-token:
    $ref: './paths/auth.yaml#/refreshToken'
  /auth/logout:
    $ref: './paths/auth.yaml#/logout'
  /auth/verify-email:
    $ref: './paths/auth.yaml#/verifyEmail'
  /auth/forgot-password:
    $ref: './paths/auth.yaml#/forgotPassword'
  /auth/reset-password:
    $ref: './paths/auth.yaml#/resetPassword'

components:
  schemas:
    $ref: './components/schemas/auth.schema.yaml'

  responses:
    $ref: './components/responses/base.response.yaml'

  securitySchemes:
    $ref: './components/security/bearer.yaml'
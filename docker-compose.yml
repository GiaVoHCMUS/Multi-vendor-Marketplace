version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: marketplace_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketplace_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: marketplace_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  adminer:
    image: adminer
    container_name: marketplace_adminer
    restart: unless-stopped
    ports:
      - "8083:8080"
    depends_on:
      - postgres

  prometheus:
    image: prom/prometheus:latest
    container_name: marketplace_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      # Ánh xạ file cấu hình từ thư mục docker/ của bạn vào container
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus # Lưu trữ dữ liệu Time-series
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: marketplace_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
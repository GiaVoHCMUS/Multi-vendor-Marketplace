version: "3.8"
services:
  db:
    image: postgres:15-alpine
    container_name: time_tracker_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    ports:
      - 8082:8080

volumes:
  postgres_data: